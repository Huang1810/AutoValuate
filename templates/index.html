<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>

<body class="bg-dark">

<div class="container">
    <div class="card mt-50">

        <div class="card-header text-center">
            <h1>Car Price Predictor</h1>
        </div>

        <div class="card-body">

            <!-- FORM (NO PAGE REDIRECT) -->
            <form id="carForm">

                <div class="form-group text-center">
                    <label>Brand</label>
                    <select name="brand" class="form-control" required>
                        {% for b in brands %}
                        <option value="{{ b }}">{{ b }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group text-center">
                    <label>Model</label>
                    <select name="model" class="form-control" required>
                        {% for m in models %}
                        <option value="{{ m }}">{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group text-center">
                    <label>Vehicle Age</label>
                    <input type="number" name="vehicle_age" class="form-control" required>
                </div>

                <div class="form-group text-center">
                    <label>KM Driven</label>
                    <input type="number" name="km_driven" class="form-control" required>
                </div>

                <div class="form-group text-center">
                    <label>Seller Type</label>
                    <select name="seller_type" class="form-control" required>
                        {% for s in seller_types %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group text-center">
                    <label>Fuel Type</label>
                    <select name="fuel_type" class="form-control" required>
                        {% for f in fuel_types %}
                        <option value="{{ f }}">{{ f }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group text-center">
                    <label>Transmission Type</label>
                    <select name="transmission_type" class="form-control" required>
                        {% for t in transmission_types %}
                        <option value="{{ t }}">{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group text-center">
                    <label>Mileage</label>
                    <input type="number" step="0.1" name="mileage" class="form-control" required>
                </div>

                <div class="form-group text-center">
                    <label>Engine</label>
                    <input type="number" name="engine" class="form-control" required>
                </div>

                <div class="form-group text-center">
                    <label>Max Power</label>
                    <input type="number" step="0.1" name="max_power" class="form-control" required>
                </div>

                <div class="form-group text-center">
                    <label>Seats</label>
                    <input type="number" name="seats" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary form-control">
                    Predict Price
                </button>

            </form>

            <br>

            <!-- RESULT HERE -->
            <div class="text-center">
                <h4>Predicted Price: <span id="prediction"></span></h4>
            </div>

        </div>
    </div>
</div>

<!-- AJAX SCRIPT -->
<script>
document.getElementById("carForm").addEventListener("submit", function(e){
    e.preventDefault();

    var formData = new FormData(this);

    document.getElementById("prediction").innerText = "Predicting...";

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("prediction").innerText = "₹ " + data;
    })
    .catch(error => {
        document.getElementById("prediction").innerText = "Error!";
    });
});
</script>

</body>
</html>
